name: Reusable Deploy

on:
  workflow_call:
    inputs:
      environment_name:
        required: true
        type: string
      runner_label:
        required: true
        type: string
      app_name:
        required: true
        type: string

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment_name }}
    runs-on: ${{ fromJSON(format('["self-hosted","{0}"]', inputs.runner_label)) }}
    environment: ${{ inputs.environment_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build environment file
        env:
          ENV_FILE_BASE64: ${{ secrets.ENV_FILE_BASE64 }}
          NODE_ENV: ${{ vars.NODE_ENV }}
          PORT: ${{ vars.PORT }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_EXPIRES_IN: ${{ vars.JWT_EXPIRES_IN }}
          POSTGRES_HOST: ${{ vars.POSTGRES_HOST }}
          POSTGRES_PORT: ${{ vars.POSTGRES_PORT }}
          POSTGRES_USER: ${{ vars.POSTGRES_USER }}
          POSTGRES_DB: ${{ vars.POSTGRES_DB }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          DB_SYNC: ${{ vars.DB_SYNC }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          if [ -n "${ENV_FILE_BASE64}" ]; then
            echo "${ENV_FILE_BASE64}" | base64 --decode > .env
          else
            {
              echo "NODE_ENV=${NODE_ENV}"
              echo "PORT=${PORT}"
              echo "JWT_SECRET=${JWT_SECRET}"
              echo "JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-3600}"
              echo "POSTGRES_HOST=${POSTGRES_HOST}"
              echo "POSTGRES_PORT=${POSTGRES_PORT:-5432}"
              echo "POSTGRES_USER=${POSTGRES_USER}"
              echo "POSTGRES_DB=${POSTGRES_DB}"
              echo "POSTGRES_PASSWORD=${POSTGRES_PASSWORD}"
              echo "DB_SYNC=${DB_SYNC:-0}"
              echo "SENTRY_DSN=${SENTRY_DSN}"
            } > .env
          fi

      - name: Ensure docker compose is available
        run: |
          set -euo pipefail
          docker version
          docker compose version

      - name: Deploy with Docker Compose
        run: |
          set -euo pipefail
          docker compose up -d postgres
          docker compose run --rm --build app npm run typeorm:migrate
          docker compose up -d --build app
          docker compose ps

      - name: Stop legacy PM2 process (if exists)
        run: |
          if command -v pm2 >/dev/null 2>&1; then
            pm2 delete "${{ inputs.app_name }}" || true
          fi
